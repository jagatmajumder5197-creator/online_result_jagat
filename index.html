<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online_Result_Jagat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="search-panel">
        <h1 class="school-name">SHRIPUR KINDERGARTEN SCHOOL</h1>
        <p class="project-name">Online_Result_Jagat</p>
        <p class="evaluation-title">First Summative Evaluation — 2026</p>
        
        <div class="input-group">
            <label for="classInp">Select Class_Sec</label>
            <select id="classInp">
                <option value="">Choose Class</option>
                <option value="NUR_A">NUR_A</option>
                <option value="NUR_B">NUR_B</option>
                <option value="K.G_A">K.G_A</option>
                <option value="K.G_B">K.G_B</option>
                <option value="I_A">I_A</option>
                <option value="II_A">II_A</option>
                <option value="III_A">III_A</option>
                <option value="IV_A">IV_A</option>
            </select>
            
            <label for="rollInp"><b>Enter Roll Number</b></label>
            <input type="number" id="rollInp" placeholder="XYZ">
            <button onclick="searchResult()" id="btn">Search Result</button>
        </div>
    </div>

    <div id="resultBox" class="marksheet-card" style="display: none;">
        <div class="header-section">
            <h1 class="student-name-header" id="stName">STUDENT NAME</h1>
        </div>

        <div class="info-table-container">
            <div class="info-row"><b>Father's_Name:</b> <span id="stFather"></span></div>
            <div class="info-row"><b>Class:</b> <span id="stClass"></span></div>
            <div class="info-row"><b>Roll No.</b> <span id="stRoll"></span></div>
        </div>

        <table class="marks-table">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Full Marks</th>
                    <th>Obt. Marks</th>
                    <th>%</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody id="tableData"></tbody>
        </table>

        <div class="result-summary">
            <p>Total Obt. Marks: <span id="resObtained"></span> / <span id="resFM"></span></p>
            <p>Percentage%: <span id="resPerc"></span> | Grade: <span id="resGrade"></span></p>
            <p>Rank: <span id="resRank"></span></p>
        </div>

        <div class="download-container">
            <button class="download-icon-btn" onclick="window.print()" title="Download">
                <img src="https://img.icons8.com/color/48/000000/download.png" alt="Download">
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
