<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jagat Online Result System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="text-align: center; padding: 20px; background: #fff; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; margin-top: 50px;">
        
        <img src="Logo_Jagat.png" alt="School Logo" style="width: 100px; height: auto; margin-bottom: 15px;">
        
        <h1 style="font-family: 'Cinzel', serif; color: #1a237e; font-size: 22px; margin: 5px 0;">SHRIPUR KG SCHOOL</h1>
        <p style="font-weight: bold; color: #555; font-size: 14px;">Online Result Portal</p>
        
        <div style="margin-top: 20px;">
            <input type="text" id="studentId" placeholder="Unique I_D দিন (যেমন: ANA01)" style="padding: 12px; width: 85%; border-radius: 5px; border: 2px solid #ddd; font-size: 16px; outline: none;">
            <button class="btn-jagat" onclick="getResult()" style="padding: 12px 25px; background: #1a237e; color: #fff; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; font-weight: bold; width: 85%; transition: 0.3s;">VIEW SCORE</button>
        </div>

        <div class="footer-brand" style="margin-top: 30px; font-size: 11px; color: #888; border-top: 1px solid #eee; padding-top: 15px;">
            Digitally Powered by<br>
            <strong>Jagat Infrastructure with Algorithm & JS</strong>
            <br><small>Verified & Secure System</small>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
